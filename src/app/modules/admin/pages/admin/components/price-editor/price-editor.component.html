<!-- Toolbar -->
<div class="editor-toolbar">
  <span class="toolbar-count" *ngIf="activeService">
    {{ activeService.list.length }}&nbsp;позицій у розділі
  </span>
  <div class="toolbar-actions">
    <button class="btn-add" (click)="openAdd.emit()">
      <svg
        class="btn-icon-svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Додати позицію
    </button>
    <button
      class="btn-review"
      (click)="openReview.emit()"
      [disabled]="saving"
      *ngIf="!saving"
    >
      <svg
        class="btn-icon-svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      Переглянути
      <span class="review-badge" *ngIf="totalChanges > 0">{{
        totalChanges
      }}</span>
    </button>
    <span class="toolbar-saving" *ngIf="saving">
      <span class="saving-spinner"></span>
      Збереження…
    </span>
  </div>
</div>

<!-- Loading -->
<div *ngIf="loading" class="loading-state">
  <span class="loading-spinner"></span>
  Завантаження прайсу...
</div>

<!-- Price editor card -->
<div *ngIf="!loading" class="price-editor">
  <!-- Tabs -->
  <div class="tabs" role="tablist">
    <button
      *ngFor="let name of tabNames; let i = index"
      class="tab-btn"
      [class.tab-btn--active]="activeTab === i"
      (click)="activeTabChange.emit(i)"
      role="tab"
      [attr.aria-selected]="activeTab === i"
    >
      {{ name }}
      <span class="tab-count">{{ services[i].list.length }}</span>
    </button>
  </div>

  <!-- Price list -->
  <div class="price-list" *ngIf="activeService">
    <ng-container *ngFor="let item of activeService.list; let i = index">
      <!-- Category group with children -->
      <ng-container *ngIf="item.list && item.list.length > 0">
        <div class="group-header">
          <span class="group-header__title">{{ item.title }}</span>
          <button
            class="btn-delete"
            (click)="
              removeTopLevel.emit({ serviceIndex: activeTab, itemIndex: i })
            "
            title="Видалити групу з усіма підпозиціями"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
              <path d="M10 11v6M14 11v6"></path>
              <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"></path>
            </svg>
          </button>
        </div>
        <div
          *ngFor="let child of item.list; let j = index"
          class="price-row price-row--child"
        >
          <span class="row-title">{{ child.title }}</span>
          <div class="row-controls">
            <div class="price-field" *ngIf="child.editable">
              <input
                [(ngModel)]="child.price"
                class="price-input"
                placeholder="0"
                inputmode="decimal"
              />
              <span class="price-currency">грн</span>
            </div>
            <button
              class="btn-delete"
              (click)="
                removeChild.emit({
                  serviceIndex: activeTab,
                  parentIndex: i,
                  childIndex: j,
                })
              "
              title="Видалити підпозицію"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
                <path d="M10 11v6M14 11v6"></path>
                <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"></path>
              </svg>
            </button>
          </div>
        </div>
      </ng-container>

      <!-- Single row -->
      <div
        *ngIf="!item.list || item.list.length === 0"
        class="price-row"
        [class.price-row--muted]="!item.editable"
      >
        <span class="row-title">{{ item.title }}</span>
        <div class="row-controls">
          <div class="price-field" *ngIf="item.editable">
            <input
              [(ngModel)]="item.price"
              class="price-input"
              placeholder="0"
              inputmode="decimal"
            />
            <span class="price-currency">грн</span>
          </div>
          <span *ngIf="!item.editable" class="row-meta">категорія</span>
          <button
            class="btn-delete"
            (click)="
              removeTopLevel.emit({ serviceIndex: activeTab, itemIndex: i })
            "
            title="Видалити позицію"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
              <path d="M10 11v6M14 11v6"></path>
              <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"></path>
            </svg>
          </button>
        </div>
      </div>
    </ng-container>

    <!-- Empty state -->
    <div *ngIf="activeService.list.length === 0" class="empty-state">
      <svg
        viewBox="0 0 48 48"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <rect x="6" y="10" width="36" height="32" rx="3"></rect>
        <line x1="6" y1="18" x2="42" y2="18"></line>
        <line x1="14" y1="26" x2="28" y2="26"></line>
        <line x1="14" y1="32" x2="22" y2="32"></line>
      </svg>
      <p>Список порожній. Додайте першу позицію.</p>
      <button class="btn-add btn-add--sm" (click)="openAdd.emit()">
        + Додати позицію
      </button>
    </div>
  </div>
</div>
