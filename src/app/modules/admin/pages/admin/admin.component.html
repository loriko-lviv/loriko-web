<section class="admin-shell">
  <!-- Auth loader -->
  <app-admin-auth-loader *ngIf="authChecking"></app-admin-auth-loader>

  <!-- Header -->
  <header class="admin-header" *ngIf="!authChecking">
    <div class="header-brand">
      <span class="admin-badge">Адмін · Прайс-лист</span>
      <h1 class="admin-title">Редактор прайсу</h1>
    </div>
    <nav class="header-nav">
      <a class="btn-ghost" routerLink="/">← На головну</a>
      <button
        *ngIf="isAdmin"
        class="btn-ghost btn-ghost--danger"
        (click)="signOut()"
      >
        Вийти
      </button>
    </nav>
  </header>

  <!-- Alert -->
  <div
    *ngIf="statusMessage && !authChecking"
    class="admin-alert"
    [class.admin-alert--success]="statusTone === 'success'"
    [class.admin-alert--error]="statusTone !== 'success'"
  >
    <span class="alert-dot"></span>
    {{ statusMessage }}
  </div>

  <!-- Admin editor -->
  <ng-container *ngIf="!authChecking && isAdmin; else loginOrChecking">
    <app-admin-price-editor
      [services]="services"
      [activeTab]="activeTab"
      [loading]="loading"
      [saving]="saving"
      [totalChanges]="totalChanges"
      [hasChanges]="hasChanges"
      (activeTabChange)="activeTab = $event"
      (openAdd)="showAddDialog = true"
      (openReview)="showReviewDialog = true"
      (removeTopLevel)="onRemoveTopLevel($event)"
      (removeChild)="onRemoveChild($event)"
    ></app-admin-price-editor>
  </ng-container>

  <!-- Login view -->
  <ng-template #loginOrChecking>
    <ng-container *ngIf="!authChecking">
      <div class="login-panel">
        <div class="login-icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0110 0v4"></path>
          </svg>
        </div>
        <h2>Захищений доступ</h2>
        <p>
          Редагування прайс-листу доступне лише для адміністраторів. Увійдіть
          через Google, щоб продовжити.
        </p>
        <button class="btn-google" (click)="signIn()">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path
              fill="#4285F4"
              d="M23.745 12.27c0-.816-.069-1.636-.209-2.438H12.24v4.621h6.45c-.28 1.524-1.12 2.82-2.37 3.676v3.048h3.83c2.238-2.06 3.595-5.097 3.595-8.907z"
            />
            <path
              fill="#34A853"
              d="M12.24 24c3.222 0 5.929-1.062 7.906-2.891l-3.83-2.971c-1.065.716-2.432 1.14-4.076 1.14-3.13 0-5.783-2.115-6.73-4.96H1.567v3.057C3.54 21.37 7.638 24 12.24 24z"
            />
            <path
              fill="#FBBC05"
              d="M5.51 14.318a7.175 7.175 0 010-4.59V6.669H1.567a12.034 12.034 0 000 10.705l3.943-3.056z"
            />
            <path
              fill="#EA4335"
              d="M12.24 4.76a6.53 6.53 0 014.614 1.804l3.44-3.44A11.582 11.582 0 0012.24 0C7.638 0 3.54 2.629 1.567 6.669L5.51 7.727c.947-2.845 3.6-4.967 6.73-4.967z"
            />
          </svg>
          Увійти з Google
        </button>
      </div>
    </ng-container>
  </ng-template>
</section>

<!-- Dialogs -->
<app-admin-add-dialog
  *ngIf="showAddDialog"
  [services]="services"
  [initialGroupIndex]="activeTab"
  (close)="showAddDialog = false"
  (confirm)="onAddConfirm($event)"
></app-admin-add-dialog>

<app-admin-delete-dialog
  *ngIf="showDeleteDialog && deleteTarget"
  [target]="deleteTarget!"
  (close)="closeDeleteDialog()"
  (confirm)="confirmDelete()"
></app-admin-delete-dialog>

<app-admin-review-dialog
  *ngIf="showReviewDialog"
  [review]="changeReview"
  [hasChanges]="hasChanges"
  [totalChanges]="totalChanges"
  (close)="showReviewDialog = false"
  (save)="savePrices()"
></app-admin-review-dialog>
